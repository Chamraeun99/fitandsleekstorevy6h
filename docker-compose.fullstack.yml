services:
  db:
    image: postgres:15-alpine
    container_name: fitandsleek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitandsleek_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Norng@123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fitandsleek_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fitandsleek.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitandsleek_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fitandsleek_v2
      DB_USERNAME: postgres
      DB_PASSWORD: "Norng@123"
      APP_URL: http://localhost:8000
      APP_PORT: 8000
      SERVER_PORT: 8000
      IMAGE_VECTORIZE_URL: http://host.docker.internal:9000/vectorize
      QDRANT_URL: http://host.docker.internal:6333
    command: sh -lc "rm -rf public/storage && php artisan storage:link && php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - default
      - fitandsleek_fullstack_default
    ports:
      - "8000:8000"
    volumes:
      # Sync PHP source from host (AVIF validation, etc.) without replacing vendor/ from the image
      - ./backend/app:/var/www/html/app
      - ./backend/config:/var/www/html/config
      - ./backend/database/migrations:/var/www/html/database/migrations
      - ./backend/.env:/var/www/html/.env
      - ./backend/routes:/var/www/html/routes
      - ./backend/storage/app/public:/var/www/html/storage/app/public

  frontend:
    image: node:20-alpine
    container_name: fitandsleek_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: /api
      VITE_BACKEND_ORIGIN: ""
      VITE_PROXY_TARGET: http://host.docker.internal:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: sh -lc "[ -x node_modules/.bin/vite ] || npm install; npm run build; npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: fitandsleek_ngrok
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - fitandsleek_fullstack_default
    env_file:
      - ./backend/.env
    command:
      - "http"
      - "backend:8000"
    ports:
      - "4040:4040"

  cf_frontend:
    image: cloudflare/cloudflared:latest
    container_name: fitandsleek_cf_frontend
    restart: unless-stopped
    depends_on:
      - frontend
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "--url"
      - "http://frontend:5173"
    profiles:
      - cloudflare

  cf_backend:
    image: cloudflare/cloudflared:latest
    container_name: fitandsleek_cf_backend
    restart: unless-stopped
    depends_on:
      - backend
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "--url"
      - "http://backend:8000"
    profiles:
      - cloudflare

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: fitandsleek_tunnel
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - default
      - fitandsleek_fullstack_default

volumes:
  postgres_data:
  pgadmin_data:
  frontend_node_modules:

networks:
  fitandsleek_fullstack_default:
    external: true
